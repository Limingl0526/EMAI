<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Op-Copilot: AI Dispatch Interface</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    /* --- 基础样式 --- */
    :root { --bg-dark: #0f0f13; --panel-bg: #1a1a1f; --border: #333; --accent: #4db8ff; --text-main: #e0e0e0; --font: 'Segoe UI', monospace; }
    body { background: var(--bg-dark); color: var(--text-main); margin: 0; height: 100vh; font-family: var(--font); overflow: hidden; }
    .grid-container { display: grid; grid-template-columns: 320px 1fr 350px; grid-template-rows: 70px 1fr 240px; width: 100%; height: 100%; }

    /* HEADER */
    .header { grid-column: 1 / -1; background: #000; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; }
    .brand-box .brand { font-size: 1.1rem; font-weight: bold; color: #fff; }
    .score-board { display: flex; gap: 30px; background: #111; padding: 5px 20px; border-radius: 8px; border: 1px solid #333; }
    .score-item { display: flex; flex-direction: column; align-items: center; min-width: 60px; }
    .score-label { font-size: 0.7rem; color: #888; text-transform: uppercase; }
    .score-val { font-size: 1.2rem; font-weight: bold; font-family: monospace; }
    .val-score { color: #FFD700; } .val-resolved { color: #4CAF50; } .val-pending { color: #ff4444; }
    .clock-box { font-family: monospace; font-size: 1.2rem; color: #4CAF50; }
    .clock-box.rush { color: #ff4444; text-shadow: 0 0 5px #ff0000; }

    /* PANELS */
    .panel { background: var(--panel-bg); border: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
    .panel-header { background: #141416; padding: 8px 15px; font-size: 0.8rem; font-weight: bold; color: #888; border-bottom: 1px solid var(--border); }
    .panel-content { flex: 1; overflow-y: auto; padding: 10px; }

    /* MAP */
    .map-container { grid-row: 2 / 3; grid-column: 2 / 3; position: relative; }
    #map { width: 100%; height: 100%; background: #050505; }
    
    /* Markers */
    .marker-pin { display: flex; align-items: center; justify-content: center; color: white; font-size: 10px; font-weight: bold; box-shadow: 0 0 4px #000; transition: all 0.2s; border: 2px solid white; }
    .marker-pin.selected-unit { border-color: #FFD700; box-shadow: 0 0 15px #FFD700; transform: scale(1.4); z-index: 9999; }
    .shape-circle { border-radius: 50%; } .shape-square { border-radius: 2px; } .shape-cross { border-radius: 4px; } 

    .inc-marker { display: flex; align-items: center; justify-content: center; font-size: 18px; position: relative; transition: all 0.3s; cursor: context-menu; }
    .inc-marker.selected-inc { transform: scale(1.4); z-index: 1000; filter: drop-shadow(0 0 8px currentColor); }
    .inc-pulse { position: absolute; width: 100%; height: 100%; border-radius: 50%; border: 2px solid currentColor; animation: pulse 1.5s infinite; opacity: 0.7; }

    /* LISTS */
    .bottom-panel { grid-row: 3 / 4; grid-column: 1 / 3; border-top: 1px solid var(--border); }
    .incident-row { display: flex; padding: 10px 15px; border-bottom: 1px solid #333; cursor: pointer; transition: background 0.2s; }
    .incident-row:hover { background: #222; }
    .incident-row.selected { background: #2c2c35; border-left: 4px solid var(--accent); }
    
    .inc-icon-box { font-size: 1.5rem; margin-right: 15px; } .inc-details { flex: 1; }
    .inc-title { font-weight: bold; font-size: 0.9rem; color: #fff; } .inc-meta { font-size: 0.8rem; color: #888; }
    
    .req-tag {
        display: inline-block;
        padding: 2px 6px;
        border-radius: 4px;
        margin-right: 5px;
        font-weight: bold;
        font-size: 0.85rem;
        text-shadow: 0 1px 2px rgba(0,0,0,0.8);
        border: 1px solid rgba(255,255,255,0.3);
    }

    .inc-stats { width: 200px; display: flex; flex-direction: column; align-items: flex-end; }
    .eta-text { font-size: 0.8rem; font-family: monospace; color: var(--accent); }
    .p-track { width: 100%; height: 6px; background: #333; border-radius: 3px; overflow: hidden; margin-top:2px; }
    .p-bar { height: 100%; transition: width 0.5s linear; }
    .time-bar { height: 100%; transition: width 0.5s linear; background: #555; }

    /* UNITS */
    .left-panel { grid-row: 2 / 3; grid-column: 1 / 2; }
    .unit-card { background: #25252a; border-left: 3px solid #555; padding: 10px; margin-bottom: 8px; font-size: 0.85rem; cursor: pointer; border: 1px solid transparent; }
    .unit-card:hover { background: #333; }
    .unit-card.highlight-unit { border-color: #FFD700; background: #2a2a20; } 
    
    .dispatch-btn { background: linear-gradient(90deg, #1b5e20, #2e7d32); color: #fff; width: 100%; border: none; padding: 8px; margin-top: 8px; cursor: pointer; font-weight: bold; border-radius: 3px; display: flex; justify-content: center; gap: 5px; }
    .dispatch-btn:hover { background: linear-gradient(90deg, #2e7d32, #388e3c); }

    /* --- 🔥 CHAT & MESSAGES (iOS Style) --- */
    .right-panel { grid-row: 2 / 4; grid-column: 3 / 4; border-left: 1px solid var(--border); }
    .chat-area { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
    
    .chat-bubble {
        max-width: 90%;
        padding: 12px 15px;
        border-radius: 16px;
        font-size: 0.9rem;
        line-height: 1.45;
        position: relative;
        word-wrap: break-word;
        box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        animation: popIn 0.3s cubic-bezier(0.25, 1, 0.5, 1);
    }
    
    .bubble-ai { align-self: flex-start; background-color: #2c2c2e; color: #fff; border-bottom-left-radius: 4px; }
    .bubble-system { align-self: center; background: transparent; color: #666; font-size: 0.75rem; box-shadow: none; padding: 5px; text-align: center; border: 1px solid #333; border-radius: 20px; }
    .bubble-header { font-size: 0.7rem; font-weight: 700; margin-bottom: 6px; color: #8e8e93; text-transform: uppercase; letter-spacing: 0.5px; }
    .bubble-text { color: #e5e5ea; margin-bottom: 10px; }

    .action-block { background-color: rgba(60, 60, 67, 0.6); border-left: 3px solid #0a84ff; border-radius: 6px; padding: 8px 10px; margin-top: 6px; font-family: var(--font); font-size: 0.8rem; display: flex; align-items: center; justify-content: space-between; }
    .action-target { font-weight: bold; color: #fff; }
    .action-arrow { color: #888; margin: 0 6px; font-size: 0.8rem; }
    .action-id { color: #0a84ff; font-weight: bold; font-family: monospace; }
    
    @keyframes popIn { from { opacity: 0; transform: translateY(8px) scale(0.96); } to { opacity: 1; transform: translateY(0) scale(1); } }

    /* CONTROLS */
    .controls { display: flex; align-items: center; gap: 5px; }
    .controls button { background: #333; border: 1px solid #555; color: #ccc; padding: 2px 8px; cursor: pointer; font-family: inherit; }
    .controls button.active { background: #4CAF50; color: #000; }
    .rate-select { background: #222; color: #fff; border: 1px solid #444; padding: 2px; font-family: monospace; margin-right: 5px; }
    .ai-freq-select { background: #331133; color: #bf00ff; border: 1px solid #bf00ff; padding: 2px; font-family: monospace; margin-right: 5px; font-weight: bold; }

    /* MODE TOGGLE */
    .mode-toggle { display: flex; background: #111; border: 1px solid #444; border-radius: 4px; margin-right: 15px; overflow: hidden; }
    .mode-btn { background: transparent; border: none; color: #666; padding: 4px 12px; cursor: pointer; font-size: 0.75rem; font-weight: bold; font-family: var(--font); transition: all 0.2s; }
    .mode-btn.active-mode { color: #fff; text-shadow: none; }
    
    .mode-btn.active-mode.mode-auto { background: #bf00ff; box-shadow: 0 0 10px #bf00ff; color: #fff; }
    .mode-btn.active-mode.mode-assist { background: #00bcd4; box-shadow: 0 0 10px #00bcd4; color: #000; }
    .mode-btn.active-mode.mode-human { background: #ffffff; box-shadow: 0 0 10px #ffffff; color: #000; }

    /* 🔴 FORCE END BUTTON */
    .force-end-btn { background: #d32f2f !important; color: white !important; font-weight: bold; border: 1px solid #b71c1c; }
    .force-end-btn:hover { background: #b71c1c !important; }

    /* SETUP */
    #setup-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9999; display: flex; justify-content: center; align-items: center; }
    .config-box { width: 400px; background: #1a1a1f; padding: 30px; border: 1px solid #444; border-radius: 8px; }
    .cfg-row { display: flex; justify-content: space-between; margin-bottom: 10px; }
    .cfg-row input { background: #000; border: 1px solid #444; color: #fff; text-align: center; width: 50px; }
    .start-btn { width: 100%; background: #4CAF50; border: none; padding: 12px; font-weight: bold; cursor: pointer; margin-top: 15px; }

    @keyframes pulse { 0% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(2); opacity: 0; } }
  </style>
</head>
<body>

<div id="setup-overlay">
  <div class="config-box">
    <h2 style="color:var(--accent); margin-top:0;">SYSTEM INIT</h2>
    <div class="cfg-row"><label>POLICE</label><input type="number" id="n-police" value="5"></div>
    <div class="cfg-row"><label>FIRE</label><input type="number" id="n-fire" value="2"></div>
    <div class="cfg-row"><label>MEDIC</label><input type="number" id="n-medic" value="3"></div>
    <div class="cfg-row"><label>SWAT</label><input type="number" id="n-swat" value="1"></div>
    <div class="cfg-row"><label>HAZMAT</label><input type="number" id="n-hazmat" value="1"></div>
    <div class="cfg-row"><label>TRAFFIC</label><input type="number" id="n-traffic" value="2"></div>

    <div style="border-top:1px solid #333; margin-top:15px; padding-top:15px;">
        <div style="font-size:0.8rem; color:#888; margin-bottom:5px;">RESEARCH MODE (PPT)</div>
        
        <div style="display:flex; gap:10px; margin-bottom:5px;">
             <button class="start-btn" style="background:#00bcd4; margin-top:0;" onclick="startExperiment('ASSIST')">
                🤖 CO-PILOT TEST
             </button>
             <button class="start-btn" style="background:#ffffff; color:#000; margin-top:0;" onclick="startExperiment('HUMAN')">
                👤 HUMAN TEST
             </button>
        </div>

        <div style="font-size:0.7rem; color:#666; text-align:center; margin-top:5px;">
           Fixed: 20s Spawn | 10m Duration | 10x Speed | Reset
        </div>
    </div>

    <div style="margin-top:20px; font-size:0.8rem; color:#888;">--- OR MANUAL ---</div>
    <button class="start-btn" onclick="startGame()">FREE PLAY START</button>
  </div>
</div>

<div class="grid-container">
  <div class="header">
    <div class="brand-box"><div class="brand">Op-Copilot V3.16</div></div>
    <div class="score-board">
      <div class="score-item"><span class="score-label">Score</span><span class="score-val val-score" id="sc-score">0</span></div>
      <div class="score-item"><span class="score-label">Resolved</span><span class="score-val val-resolved" id="sc-resolved">0</span></div>
      <div class="score-item"><span class="score-label">Pending</span><span class="score-val val-pending" id="sc-pending">0</span></div>
    </div>
    <div style="display:flex; align-items:center; gap:15px;">
      <div class="controls">
        <div class="mode-toggle">
            <button class="mode-btn" id="btn-auto" onclick="window.setDispatchMode('AUTO')">AI PILOT</button>
            <button class="mode-btn" id="btn-assist" onclick="window.setDispatchMode('ASSIST')">CO-PILOT</button>
            <button class="mode-btn active-mode mode-human" id="btn-human" onclick="window.setDispatchMode('HUMAN')">HUMAN</button>
        </div>

        <span style="font-size:0.7rem; color:#bf00ff; margin-right:5px;">AI FREQ:</span>
        <select class="ai-freq-select" onchange="window.updateAIFreq(this.value)">
            <option value="EVENT" selected>ON EVENT</option>
            <option value="5000">5 SEC</option>
            <option value="10000">10 SEC</option>
        </select>

        <span style="font-size:0.7rem; color:#888; margin-right:5px; margin-left:15px;">SPAWN:</span>
        <select class="rate-select" id="spawn-select" onchange="window.setSpawnRate(this.value)">
            <option value="3000">FAST (3s)</option>
            <option value="6000">NORM (6s)</option>
            <option value="12000">SLOW (12s)</option>
            <option value="30000">REAL (30s)</option>
            <option value="99999999" selected>MANUAL</option>
        </select>

        <button onclick="setSpeed(1)" class="active">1x</button>
        <button onclick="setSpeed(10)">10x</button>
        <button onclick="setSpeed(50)">50x</button>
        <button onclick="window.forceEvent()" class="force-btn">+ EVENT</button>
        <button onclick="window.finishExperiment()" class="force-end-btn" title="End Session & Log Data">🛑 END</button>
      </div>
      <div class="clock-box" id="clock">07:30:00</div>
    </div>
  </div>

  <div class="panel left-panel">
    <div class="panel-header">Fleet Status</div>
    <div class="panel-content" id="unit-list"></div>
  </div>

  <div class="panel map-container">
    <div id="map"></div>
  </div>

  <div class="panel right-panel">
    <div class="panel-header">AI Comms Channel</div>
    <div class="panel-content chat-area" id="ai-chat">
      <div class="chat-bubble bubble-system">System Online. Waiting for events...</div>
    </div>
  </div>

  <div class="panel bottom-panel">
    <div class="panel-header">Active Incidents</div>
    <div class="panel-content" id="incident-list"></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module">
import { initGame, getGameState, triggerScenario, dispatchUnitBackend, stopGameSession, setExperimentMode, COLORS, setTimeScale, findBestUnit, setAIMode, setAIFrequency } from './gameEngine_clean.js';

const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([33.7490, -84.3880], 13);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

const markers = {}; 
const routes = {}; 
const incMarkers = {}; 

let selectedIncId = null;  
let selectedUnitId = null; 
let spawnIntervalId = null; 
let lastUnitHtml = ""; 
let experimentTimer = null; 

window.logToChat = (sender, htmlContent, type = 'ai') => {
  const box = document.getElementById('ai-chat');
  let bubbleClass = 'chat-bubble';
  if (type === 'ai') bubbleClass += ' bubble-ai';
  else if (type === 'system') bubbleClass += ' bubble-system';
  
  const div = document.createElement('div');
  div.className = bubbleClass;
  div.innerHTML = htmlContent; 
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
};

window.updateAIFreq = (val) => {
    setAIFrequency(val);
    const label = val === 'EVENT' ? 'Event Trigger' : `${val/1000}s Timer`;
    window.logToChat(null, `AI Frequency updated to: ${label}`, 'system');
};

window.setDispatchMode = (mode) => {
    document.getElementById('btn-auto').className = 'mode-btn';
    document.getElementById('btn-assist').className = 'mode-btn';
    document.getElementById('btn-human').className = 'mode-btn';

    if (mode === 'AUTO') document.getElementById('btn-auto').classList.add('active-mode', 'mode-auto');
    else if (mode === 'ASSIST') document.getElementById('btn-assist').classList.add('active-mode', 'mode-assist');
    else if (mode === 'HUMAN') document.getElementById('btn-human').classList.add('active-mode', 'mode-human');

    setAIMode(mode);
    
    if (mode === 'HUMAN') {
        window.logToChat(null, "⚠️ Manual Control Only. AI Offline.", 'system');
    } else {
        window.logToChat(null, mode==='AUTO' ? "AI has taken control." : "AI set to Advisory Mode.", 'system');
    }
};

window.startExperiment = (mode) => {
    // 🔴 开启实验模式 (使用固定序列)
    setExperimentMode(true);

    const cfg = {
        units: { Police: 5, Fire: 2, Medic: 3, SWAT: 1, Hazmat: 1, Traffic: 2 } 
    };
    initGame(cfg);
    document.getElementById('setup-overlay').style.display = 'none';
    
    // 2. Lock PPT Variables
    // Incident Rate: 20s
    window.setSpawnRate(20000); 
    document.getElementById('spawn-select').value = "20000";
    
    // 3. Set Speed to 10x
    setTimeScale(10);
    document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
    const btn10x = document.querySelector('button[onclick="setSpeed(10)"]');
    if(btn10x) btn10x.classList.add('active');

    // AI Frequency: Event Trigger
    window.updateAIFreq('EVENT');
    
    // Set Mode based on button clicked
    window.setDispatchMode(mode); 

    // 3. Start Loop
    setInterval(tick, 30);
    
    // 4. Set 10 Minute Timer
    const modeLabel = mode === 'HUMAN' ? 'HUMAN' : 'CO-PILOT';
    window.logToChat(null, `🧪 ${modeLabel} EXPERIMENT STARTED: 10 MINUTES REMAINING (10x Speed)`, 'system');
    
    if(experimentTimer) clearTimeout(experimentTimer);
    experimentTimer = setTimeout(() => {
        window.finishExperiment();
    }, 600000); // 10 minutes
};

// 🔴 关键修改：将函数挂载到 window，以便按钮可以调用
window.finishExperiment = () => {
    if (spawnIntervalId) {
        window.setSpawnRate(99999999);
        clearInterval(spawnIntervalId);
        stopGameSession(); 
        window.logToChat(null, "🛑 SESSION ENDED MANUALLY. DATA LOGGED.", 'system');
        alert("🧪 Experiment Complete!\nData saved to log file.");
    }
};

// Normal Free Play
window.startGame = () => {
  // 🔴 自由模式：关闭固定序列，使用随机生成
  setExperimentMode(false);

  const cfg = {
    units: {
      Police: document.getElementById('n-police').value, 
      Fire: document.getElementById('n-fire').value,
      Medic: document.getElementById('n-medic').value, 
      SWAT: document.getElementById('n-swat').value,
      Hazmat: document.getElementById('n-hazmat').value, 
      Traffic: document.getElementById('n-traffic').value
    }
  };
  initGame(cfg);
  document.getElementById('setup-overlay').style.display = 'none';
  setInterval(tick, 30); 
  
  const defaultRate = document.getElementById('spawn-select').value;
  window.setSpawnRate(defaultRate);
  window.setDispatchMode('HUMAN');
};

window.setSpawnRate = (ms) => {
    if (spawnIntervalId) clearInterval(spawnIntervalId);
    ms = Number(ms);
    if(ms < 90000000) {
        spawnIntervalId = setInterval(() => { triggerScenario(); }, ms);
        window.logToChat(null, `Spawn Rate: ${ms/1000}s`, 'system');
    } else {
        window.logToChat(null, `Auto-Spawn DISABLED`, 'system');
    }
};

window.forceEvent = () => triggerScenario();
window.setSpeed = (s) => { setTimeScale(s); document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active')); event.target.classList.add('active'); };

function tick() {
  const state = getGameState();
  document.getElementById('sc-score').innerText = state.gameState.currentScore;
  document.getElementById('sc-resolved').innerText = state.gameState.resolvedCount;
  document.getElementById('sc-pending').innerText = state.gameState.activeCount;
  
  const date = new Date(state.gameTime);
  const clk = document.getElementById('clock');
  clk.innerText = date.toLocaleTimeString();
  const h = date.getHours();
  clk.classList.toggle('rush', (h>=7&&h<9) || (h>=16&&h<19));

  if(selectedIncId && !state.incidents.find(i => i.id === selectedIncId)) {
      selectedIncId = null;
      window.logToChat(null, 'Current incident resolved.', 'system');
  }

  renderUnits(state.units, state.incidents); 
  renderIncidents(state.incidents, state.units);
  updateMap(state.units, state.incidents);
}

function renderUnits(units, incidents) {
  const container = document.getElementById('unit-list'); 
  const targetInc = incidents.find(i => i.id === selectedIncId);

  const newHtml = units.map(u => {
    const col = COLORS[u.type];
    const isSelected = selectedUnitId === u.id;
    const isIdle = u.status === 'Idle';
    const cardClass = `unit-card ${isSelected ? 'highlight-unit' : ''}`;
    
    let actionHtml = '';
    if (targetInc && isIdle) {
       actionHtml = `<button class="dispatch-btn" onmousedown="window.dispatchAction('${u.id}', '${targetInc.id}', event)">
         🚀 DISPATCH TO ${targetInc.type}
       </button>`;
    } else if (u.assignedTo) {
       actionHtml = `<div style="font-size:0.7rem; color:#666; margin-top:4px;">Asg: #${String(u.assignedTo).slice(-4)}</div>`;
    }

    return `
      <div class="${cardClass}" style="border-left-color:${col}" onmousedown="window.selectUnit('${u.id}')">
        <div style="display:flex; justify-content:space-between;">
          <strong style="color:${isSelected ? '#FFD700' : '#fff'}">${u.id}</strong>
          <span style="color:${col}">${u.status}</span>
        </div>
        <div style="color:#888; margin-top:2px; font-size:0.75rem;">Eff: ${u.efficiency} | Drv: ${u.driverSkill}</div>
        ${actionHtml}
      </div>`;
  }).join('');

  if (newHtml !== lastUnitHtml) {
      const savedScrollTop = container.scrollTop;
      container.innerHTML = newHtml;
      container.scrollTop = savedScrollTop;
      lastUnitHtml = newHtml;
  }
}

function renderIncidents(incidents, units) {
  document.getElementById('incident-list').innerHTML = incidents.map(inc => {
    const pct = Math.min(100, (inc.currentProgress / inc.totalWorkload) * 100);
    const assignedCount = units.filter(u => u.assignedTo === inc.id).length;
    const isSelected = inc.id === selectedIncId;
    
    let etaText = assignedCount > 0 ? "EN ROUTE" : "WAITING";
    if(inc.status === 'InProgress' && inc.currentSpeed > 0) {
        const remaining = inc.totalWorkload - inc.currentProgress;
        etaText = `WORKING (-${inc.currentSpeed.toFixed(1)}/s) | ${Math.ceil(remaining/inc.currentSpeed)}s`;
    }
    
    const elapsed = (getGameState().gameTime - inc.startTime) / 1000;
    const timeLeft = Math.max(0, inc.timeout - elapsed);
    const timePct = Math.min(100, (timeLeft / inc.timeout) * 100);
    const timeColor = timePct < 20 ? '#ff4444' : '#666'; 
    const expireText = inc.status === 'Expired' ? 'EXPIRED' : `${Math.ceil(timeLeft)}s left`;
    const expireColor = inc.status === 'Expired' ? '#ff4444' : '#888';

    const reqHtml = inc.req.map(r => {
        const c = COLORS[r] || '#fff';
        return `<span class="req-tag" style="background:${c}22; color:${c}; border-color:${c}">${r}</span>`;
    }).join('');

    return `
      <div class="incident-row ${isSelected ? 'selected' : ''}" onmousedown="window.selectIncident('${inc.id}')" style="opacity:${inc.status==='Expired'?0.5:1}">
        <div class="inc-icon-box" style="color:${inc.color}">${inc.icon}</div>
        <div class="inc-details">
           <div class="inc-title">${inc.type} <span style="font-weight:normal; color:#666;">#${String(inc.id).slice(-4)}</span></div>
           <div class="inc-meta" style="margin-top:4px;">${reqHtml}</div>
           <div style="font-size:0.7rem; color:${expireColor}; margin-top:4px;">${expireText}</div>
        </div>
        <div class="inc-stats">
           <div class="eta-text" style="color:${inc.color}">${etaText}</div>
           <div class="p-track"><div class="p-bar" style="width:${pct}%; background:${inc.color}"></div></div>
           <div class="p-track"><div class="time-bar" style="width:${timePct}%; background:${timeColor}"></div></div>
        </div>
      </div>`;
  }).join('');
}

function updateMap(units, incidents) {
  units.forEach(u => {
    const isMoving = u.status === 'Responding' || u.status === 'Returning';
    if(!markers[u.id]) {
      let shape = u.type==='Fire'?'shape-square':(u.type==='Medic'?'shape-cross':'shape-circle');
      const html = `<div class="marker-pin ${shape}" id="pin-${u.id}" style="background:${COLORS[u.type]}; width:16px; height:16px;">${u.type[0]}</div>`;
      markers[u.id] = L.marker([u.lat, u.lng], { icon: L.divIcon({html, className:'', iconSize:[16,16]}) })
        .addTo(map)
        .on('click', (e) => { 
            L.DomEvent.stopPropagation(e); 
            window.selectUnit(u.id);       
        });
      markers[u.id].bindPopup(`<strong>${u.id}</strong><br>${u.status}`);
    }
    markers[u.id].setLatLng([u.lat, u.lng]).setOpacity(u.status === 'Idle' ? 0.7 : 1.0);
    const pinEl = document.getElementById(`pin-${u.id}`);
    if(pinEl) {
        if(selectedUnitId === u.id) pinEl.classList.add('selected-unit');
        else pinEl.classList.remove('selected-unit');
    }
    if(isMoving && u.route) {
       if(!routes[u.id]) routes[u.id] = L.polyline(u.route.path, {color:COLORS[u.type], weight:2, dashArray:'4'}).addTo(map);
       else routes[u.id].setLatLngs(u.route.path);
    } else if(routes[u.id]) { map.removeLayer(routes[u.id]); delete routes[u.id]; }
  });

  Object.keys(incMarkers).forEach(k => { if(!incidents.find(i=>i.id===k)){ map.removeLayer(incMarkers[k]); delete incMarkers[k]; } });
  
  incidents.forEach(inc => {
    if(!incMarkers[inc.id]) {
       const html = `<div class="inc-marker" id="marker-${inc.id}" style="color:${inc.color}"><div class="inc-pulse"></div><div style="z-index:2;">${inc.icon}</div></div>`;
       incMarkers[inc.id] = L.marker([inc.lat, inc.lng], { icon: L.divIcon({html, className:'', iconSize:[30,30]}) })
       .addTo(map)
       .on('click', (e) => {
           L.DomEvent.stopPropagation(e);
           window.selectIncident(inc.id); 
       })
       .on('contextmenu', (e) => {
           L.DomEvent.stopPropagation(e);
           L.DomEvent.preventDefault(e); 
           if (selectedUnitId) { window.dispatchAction(selectedUnitId, inc.id); } 
           else { window.logToChat(null, 'Select a unit first to dispatch via Right-Click.', 'system'); }
       });
    }
    const el = document.getElementById(`marker-${inc.id}`);
    if(el) { 
        if(selectedIncId === inc.id) el.classList.add('selected-inc'); 
        else el.classList.remove('selected-inc'); 
    }
  });
}

window.selectUnit = (uid) => {
  if (selectedUnitId === uid) return; 
  selectedUnitId = uid;
  const m = markers[uid]; 
  if(m) map.panTo(m.getLatLng());
};

window.selectIncident = (iid) => {
  if (selectedIncId === iid) return;
  selectedIncId = iid;
  const inc = getGameState().incidents.find(i=>i.id===iid);
  if(inc) {
      const best = findBestUnit(inc);
      const m = incMarkers[iid];
      if(m) map.setView(m.getLatLng(), 14);
  }
};

window.dispatchAction = (uid, iid, event) => {
  if(event) event.stopPropagation(); 
  dispatchUnitBackend(uid, iid);
  selectedUnitId = null; 
};

map.on('click', () => { selectedUnitId = null; });

</script>
</body>
</html>
